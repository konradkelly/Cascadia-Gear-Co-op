name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Build and start Docker Compose services
        run: docker compose -f docker-compose.dev.yml up --build -d
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

      # - name: Run tests (to be implemented)
      #   run: npm test

      - name: Stop Docker Compose services
        run: docker compose -f docker-compose.dev.yml down

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export DB_HOST=${{ secrets.RDS_HOST }}
            export DB_USER=${{ secrets.RDS_USER }}
            export DB_PASSWORD=${{ secrets.RDS_PASSWORD }}
            export DB_NAME=${{ secrets.RDS_DATABASE }}
            export REDIS_HOST=redis
            export REDIS_PORT=6379
            export SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            cd ~/Cascadia-Gear-Co-op
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build